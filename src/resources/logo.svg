<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- App background -->
  <rect width="100" height="100" rx="22" fill="#1E1E2E"/>

  <!-- Crown / start button -->
  <rect x="43" y="11" width="14" height="20" rx="6" fill="#4DABF7"/>

  <!-- Watch face -->
  <circle cx="50" cy="61" r="31" fill="#252538" stroke="#4DABF7" stroke-width="6"/>

  <!-- Minute hand — 12 o'clock -->
  <line x1="50" y1="61" x2="50" y2="38"
        stroke="#C1C2C5" stroke-width="7" stroke-linecap="round"/>

  <!-- Hour hand — ~2 o'clock (green = running) -->
  <line x1="50" y1="61" x2="66" y2="49"
        stroke="#69DB7C" stroke-width="6" stroke-linecap="round"/>

  <!-- Center hub -->
  <circle cx="50" cy="61" r="6" fill="#4DABF7"/>

</svg>
